<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Widget Button</title>
<style>
  /* Button Container Styling */
  .general-conditions-btn {
    display: inline-flex;
    align-items: center;
    background-color: #24438e; /* Matches the dark blue background */
    color: #f7b22a; /* Matches the yellow text/icon color */
    text-decoration: none;
    padding: 10px 20px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    font-size: 18px;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  /* Hover effect for better user experience */
  .general-conditions-btn:hover {
    opacity: 0.85;
  }

  /* Circular 'i' Icon Styling */
  .info-icon {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 26px;
    height: 26px;
    border: 2px solid #f7b22a;
    border-radius: 50%;
    margin-right: 12px;
    font-family: "Times New Roman", Times, serif; /* Gives the 'i' a serif look */
    font-style: italic;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>

<a href="https://www.admiralbet.es/es/juego-mas-seguro" class="general-conditions-btn" target="_top">
  <span class="info-icon">i</span>
  <span>General Conditions &gt;&gt;</span>
</a>

</body>
</html>
